<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Last Ember — DM Screen</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ============================================================= -->
<!-- CUSTOM ICON FAMILY — "Emberlight"                              -->
<!-- Consistent line set: 24x24 grid, 1.6 stroke, round caps/joins. -->
<!-- Documented in DESIGN-SYSTEM.md. Inlined so it works on file:// -->
<!-- ============================================================= -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- brand / ember flame -->
  <symbol id="ic-ember" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2.5c2.5 3 4 5 4 7.5a4 4 0 0 1-8 0c0-1 .4-2 1-2.8.2 1.4 1 2 1.8 2.2-.4-2 .3-4.2 1.2-6.9Z"/>
    <path d="M12 21.5c4 0 7-2.6 7-6.2 0-1.4-.4-2.7-1-3.8"/>
    <path d="M12 21.5c-4 0-7-2.6-7-6.2 0-1.4.4-2.7 1-3.8"/>
  </symbol>

  <!-- overview / book-open -->
  <symbol id="ic-overview" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 5.5C10 4 7.5 3.5 4.5 4v13c3-.5 5.5 0 7.5 1.5 2-1.5 4.5-2 7.5-1.5V4c-3-.5-5.5 0-7.5 1.5Z"/>
    <path d="M12 5.5v13"/>
  </symbol>

  <!-- Tier I — Material Plane: barrow mound -->
  <symbol id="ic-material" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18c0-5 4-8 9-8s9 3 9 8"/>
    <path d="M3 18h18"/>
    <path d="M12 10V5"/><path d="M9.5 6.5 12 5l2.5 1.5"/>
  </symbol>

  <!-- Tier II — Feywild: leaf-spark -->
  <symbol id="ic-feywild" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 19c0-7 5-13 13-13 0 8-5 13-13 13Z"/>
    <path d="M9 15c2-2 4-3 6-3.5"/>
    <path d="M18 3.5v3M16.5 5h3"/>
  </symbol>

  <!-- Tier III — Shadowfell: broken moon -->
  <symbol id="ic-shadowfell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16.5 3.2A9 9 0 1 0 20.8 14a6.6 6.6 0 0 1-8.5-8.5c1.3-.5 2.8-2 4.2-2.3Z"/>
    <path d="m9 9 2 2-2 2M14 13l-1.5 1.5"/>
  </symbol>

  <!-- Tier IV — the Source: radiant throne-sun -->
  <symbol id="ic-source" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9 6.7 6.7M17.3 17.3l1.8 1.8M19.1 4.9 17.3 6.7M6.7 17.3 4.9 19.1"/>
  </symbol>

  <!-- villain / dragon -->
  <symbol id="ic-dragon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 7c2-1 4 0 5 1.5C9.5 6 12 5 15 5.5c-1 1-1.4 2-1.2 3.2 2.3.3 4.2 1.8 5.2 4.3-1.3-.4-2.4-.4-3.4 0 1 1.3 1.4 2.8 1.2 4.5-1-1.2-2.2-1.9-3.6-2.1-.4 1.7-1.6 3-3.4 3.6.3-1.3.1-2.4-.6-3.3-2.6.6-5-.4-6.6-2.8 1.4.2 2.6 0 3.6-.6C4.8 12.8 3.6 11 3.4 8.7 4.4 9.4 5.4 9.7 6.5 9.6 5.3 8.7 4 8.1 3 7Z"/>
    <circle cx="6.5" cy="7.7" r=".6" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- items / gem -->
  <symbol id="ic-item" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3h12l3 5-9 13L3 8Z"/>
    <path d="M3 8h18M9 3 7 8l5 13 5-13-2-5M9 8l3-5 3 5"/>
  </symbol>

  <!-- bestiary / skull -->
  <symbol id="ic-skull" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 11a7 7 0 0 1 14 0c0 2.2-1 3.6-2 4.4V18a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 7 18v-2.6C6 14.6 5 13.2 5 11Z"/>
    <circle cx="9.2" cy="11" r="1.4"/><circle cx="14.8" cy="11" r="1.4"/>
    <path d="M12 14v2M10 19.5v-2M14 19.5v-2"/>
  </symbol>

  <!-- clocks / segmented dial -->
  <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 3v9l5 3M12 3a9 9 0 0 1 7.8 4.5"/>
  </symbol>

  <!-- initiative / crossed swords -->
  <symbol id="ic-init" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4h3l9.5 9.5M14.5 14.5 18 18"/>
    <path d="M20 4h-3l-9.5 9.5M9.5 14.5 6 18"/>
    <path d="M3.5 17.5 6 20M20.5 17.5 18 20"/>
  </symbol>

  <!-- dice / d20 -->
  <symbol id="ic-dice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2.5 21 7.5v9L12 21.5 3 16.5v-9Z"/>
    <path d="M12 2.5 5 7l7 4 7-4ZM12 11v10.5M5 7v9l7 4M19 7v9l-7 4"/>
  </symbol>

  <!-- utility -->
  <symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="ic-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></symbol>
  <symbol id="ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></symbol>
  <symbol id="ic-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12a8.5 8.5 0 1 0 2.5-6"/><path d="M3 4v4h4"/></symbol>
  <symbol id="ic-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-7-9.5A3.7 3.7 0 0 1 12 7a3.7 3.7 0 0 1 7 3.5C19 15.6 12 20 12 20Z"/></symbol>
  <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6Z"/></symbol>
  <symbol id="ic-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></symbol>
  <symbol id="ic-next" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 6 6 6-6 6M14 6v12"/></symbol>
  <symbol id="ic-return" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 4 12l5 5"/><path d="M4 12h10a6 6 0 0 1 6 6v1"/></symbol>
  <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
</svg>

<!-- ============================================================= -->
<!-- APP SHELL                                                      -->
<!-- ============================================================= -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <svg class="brand-mark"><use href="#ic-ember"/></svg>
      <div class="brand-text">
        <strong>The Last Ember</strong>
        <span>DM Screen</span>
      </div>
    </div>

    <div class="search-box">
      <svg class="ic"><use href="#ic-search"/></svg>
      <input type="search" id="globalSearch" placeholder="Search beats, monsters, items…" autocomplete="off"/>
    </div>

    <nav class="nav" id="nav"><!-- built by app.js --></nav>

    <div class="sidebar-foot">
      <span id="saveState" class="save-state">saved locally</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle menu"><svg class="ic"><use href="#ic-menu"/></svg></button>
      <h1 id="viewTitle">Overview</h1>
      <div class="topbar-actions">
        <button class="icon-btn" id="diceToggle" title="Dice roller"><svg class="ic"><use href="#ic-dice"/></svg></button>
      </div>
    </header>

    <section class="view" id="view"><!-- built by app.js --></section>
  </main>

  <!-- Dice tray (slide-over) -->
  <div class="dice-tray" id="diceTray" hidden>
    <div class="dice-tray-head">
      <strong>Dice</strong>
      <button class="icon-btn" id="diceClose"><svg class="ic"><use href="#ic-x"/></svg></button>
    </div>
    <div class="dice-grid" id="diceGrid"></div>
    <div class="dice-result" id="diceResult">—</div>
    <div class="dice-log" id="diceLog"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
